# ==========================================
# Player Messages
# ==========================================
# Messages for /fly, /gm (gamemode), /god, /speed, /hat, /exp,
# /skull, /suicide, /heal, /feed, /kill, /getpos, /getdeathpos, /gmcheck.
#
# Placeholders:
#   {player}    - Target player name
#   {mode}      - Game mode name (Survival, Creative, etc.)
#   {speed}     - Speed value
#   {amount}    - Amount value
#   {x}, {y}, {z} - Coordinates
#   {world}     - World name
# ==========================================

# === Fly ===
fly:
  enabled-self: "Flight <green>enabled</green>."
  disabled-self: "Flight <red>disabled</red>."
  enabled-other: "Flight <green>enabled</green> for <yellow>{player}</yellow>."
  disabled-other: "Flight <red>disabled</red> for <yellow>{player}</yellow>."
  usage: "Usage: /fly [player]"

# === Gamemode ===
gamemode:
  changed-self: "Game mode set to <yellow>{mode}</yellow>."
  changed-other: "Set <yellow>{player}</yellow>'s game mode to <yellow>{mode}</yellow>."
