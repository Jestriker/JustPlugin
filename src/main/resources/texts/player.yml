  not-online: "Player <yellow>{player}</yellow> is not online!"
  header: "<gold><bold>Game Mode Info</bold></gold>"
  player-line: "Player: <yellow>{player}"
  mode-line: "Game Mode: {color}{mode}"
  flying-line: "Flying: {status}"
