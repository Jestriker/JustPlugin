# ==========================================
# World Messages
# ==========================================
# Messages for /weather, /time, /freezegame, /unfreezegame,
# /clearentities, /friendlyfire.
#
# Placeholders:
#   {weather}   - Weather type (sun, rain, thunder)
#   {time}      - Time value or formatted time
#   {world}     - World name
#   {items}     - Number of cleared items
#   {mobs}      - Number of cleared mobs
#   {total}     - Total cleared entities
#   {player}    - Player name (for broadcasts)
# ==========================================

# === Weather ===
weather:
  set: "Weather set to <yellow>{weather}</yellow>."
  usage: "Usage: /weather <sun|rain|thunder>"
  invalid: "Invalid weather type! Use sun, rain, or thunder."

# === Time ===
time:
  set: "Time set to <yellow>{time}</yellow> ({ticks} ticks)."
  added: "Added <yellow>{time}</yellow> ticks to the time."
  query: "Current game time: <yellow>{time}</yellow> <gray>(tick {ticks})"
  usage: "Usage: /time <set | add> <value>"
  usage-full: "Usage: /time <set | add | query> <value>"
  values-hint: "Values: day, night, noon, midnight, sunrise, sunset, or tick number"
  invalid: "Invalid time value!"
  invalid-ticks: "Invalid tick amount!"

# === Freeze Game ===
freezegame:
  frozen: "Game has been <yellow>frozen</yellow>! All tick processing is paused."
  broadcast: "The game has been <red>frozen</red> by <yellow>{player}</yellow>."

# === Unfreeze Game ===
unfreezegame:
  unfrozen: "Game has been <yellow>unfrozen</yellow>! Tick processing resumed."
  broadcast: "The game has been <green>unfrozen</green> by <yellow>{player}</yellow>."

# === Clear Entities ===
clearentities:
  success: "Entity clear complete!"
  items-removed: "Items removed: <yellow>{items}"
  mobs-removed: "Mobs removed: <yellow>{mobs}"
  total-removed: "Total: <yellow>{total}"
  # Warning message uses {seconds} placeholder (configured in config.yml entity-clear section)

# === Friendly Fire (PvP Toggle) ===
friendlyfire:
  enabled: "Friendly fire has been <green>enabled</green>."
  disabled: "Friendly fire has been <red>disabled</red>."
  already-state: "Friendly fire is already {status}<red>!"
  usage: "Usage: /friendlyfire <enable | disable>"

# === Spawn Protection ===
spawn-protection:
  denied: "You cannot do that in the spawn area."

# === Seed Protection ===
seed-protection:
  denied: "The world seed is protected on this server."
  staff-alert: "<red>[Seed]</red> <yellow>{player}</yellow> tried to view the world seed."

