# ==========================================
# World Messages
# ==========================================
# Messages for /weather, /time, /freezegame, /unfreezegame,
# /clearentities, /friendlyfire.
#
# Placeholders:
#   {weather}   - Weather type (sun, rain, thunder)
#   {time}      - Time value or formatted time
#   {world}     - World name
#   {items}     - Number of cleared items
#   {mobs}      - Number of cleared mobs
#   {total}     - Total cleared entities
#   {player}    - Player name (for broadcasts)
# ==========================================

# === Weather ===
weather:
  set: "Weather set to <yellow>{weather}</yellow>."
  usage: "Usage: /weather <sun|rain|thunder>"
  invalid: "Invalid weather type! Use sun, rain, or thunder."

# === Time ===
time:
  set: "Time set to <yellow>{time}</yellow>."
  added: "Added <yellow>{time}</yellow> ticks."
  query: "Current time: <yellow>{time}</yellow> ticks."
  usage: "Usage: /time <set|add|query> <value>"
  invalid: "Invalid time value!"

# === Freeze Game ===
freezegame:
  frozen: "Game has been <red>frozen</red>! <gray>(Tick processing paused)"
  already-frozen: "The game is already frozen!"

# === Unfreeze Game ===
unfreezegame:
  unfrozen: "Game has been <green>unfrozen</green>! <gray>(Tick processing resumed)"
  not-frozen: "The game is not frozen!"

# === Clear Entities ===
clearentities:
  cleared: "Cleared <yellow>{items}</yellow> items and <yellow>{mobs}</yellow> mobs."
  # Warning message uses {seconds} placeholder (configured in config.yml entity-clear section)

# === Friendly Fire (PvP Toggle) ===
friendlyfire:
  enabled: "PvP has been <green>enabled</green> server-wide."
  disabled: "PvP has been <red>disabled</red> server-wide."
  usage: "Usage: /friendlyfire <enable|disable>"

# === Spawn Protection ===
spawn-protection:
  denied: "You cannot do that in the spawn area."

# === Seed Protection ===
seed-protection:
  denied: "The world seed is protected on this server."
  staff-alert: "<red>[Seed]</red> <yellow>{player}</yellow> tried to view the world seed."

