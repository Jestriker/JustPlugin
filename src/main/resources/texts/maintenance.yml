# ==========================================
# Maintenance Messages
# ==========================================
# Messages for /maintenance command and maintenance mode system.
# NOTE: Kick message, MOTD, and join warning are in maintenance/config.yml.
# This file covers COMMAND responses only.
#
# Placeholders:
#   {player}    - Player name (for allowed-users management)
#   {group}     - LuckPerms group name
#   {duration}  - Cooldown duration
#   {cooldown}  - Formatted remaining cooldown
#   {count}     - Number of items in a list
# ==========================================

# === Mode Toggle ===
mode:
  enabled: "Maintenance mode is now <red>active</red><green>. Non-whitelisted players have been kicked."
  disabled: "Maintenance mode is now <green>inactive</green><green>. Server is open to all players."
  already-on: "Maintenance mode is already <red>active</red><yellow>."
  already-off: "Maintenance mode is already <green>inactive</green><yellow>."
  invalid: "Invalid mode. Use <yellow>on</yellow> or <yellow>off</yellow>."
  usage: "Usage: /maintenance mode <on|off>"

# === Allowed Users ===
allowed-users:
  added: "Added <yellow>{player}</yellow> to the maintenance whitelist."
  removed: "Removed <yellow>{player}</yellow> from the maintenance whitelist."
  already-added: "That player is already on the maintenance whitelist."
  not-on-list: "That player is not on the maintenance whitelist."
  list-header: "Maintenance whitelist <dark_gray>({count} players):"
  list-entry: "<white>{player} <dark_gray>({uuid})"
  list-empty: "No players on the maintenance whitelist."
  usage: "Usage: /maintenance allowed-users <add|remove|list> [player]"
  usage-add: "Usage: <yellow>/maintenance allowed-users add <player>"
  usage-remove: "Usage: <yellow>/maintenance allowed-users remove <player>"
  unknown-action: "Unknown action. Use <yellow>list</yellow>, <yellow>add</yellow>, or <yellow>remove</yellow>."

# === Allowed Groups ===
allowed-groups:
  added: "Added group <yellow>{group}</yellow> to the maintenance bypass list."
  removed: "Removed group <yellow>{group}</yellow> from the maintenance bypass list."
  already-added: "Group <yellow>{group}</yellow> is already in the bypass list."
  not-on-list: "Group <yellow>{group}</yellow> is not in the bypass list."
  group-not-found: "LuckPerms group <yellow>{group}</yellow> was not found. Adding anyway - it will work if the group is created later."
  no-luckperms: "LuckPerms is not installed - group bypass is inactive."
  list-header: "Maintenance bypass groups <dark_gray>({count}):"
  list-entry: "<white>{group}"
  list-empty: "No LuckPerms groups configured for maintenance bypass."
  usage: "Usage: /maintenance allowed-groups <add|remove|list> [group]"
  usage-add: "Usage: <yellow>/maintenance allowed-groups add <group>"
  usage-remove: "Usage: <yellow>/maintenance allowed-groups remove <group>"
  unknown-action: "Unknown action. Use <yellow>list</yellow>, <yellow>add</yellow>, or <yellow>remove</yellow>."

# === Cooldown ===
cooldown:
  set: "Maintenance cooldown set to <yellow>{duration}</yellow>. This will be shown in the MOTD and kick screen."
  cleared: "Maintenance cooldown cleared. MOTD and kick screen will say \"try again later\"."
  current: "Maintenance estimated to end in: <yellow>{cooldown}"
  no-cooldown: "No maintenance cooldown is set."
  invalid-duration: "Invalid duration. Examples: <yellow>30m<gray>, <yellow>1h<gray>, <yellow>2d<gray>, <yellow>1d12h"
  usage: "Usage: /maintenance cooldown <duration|clear|info>"
  usage-hint: "Duration examples: <white>30m<gray>, <white>1h<gray>, <white>2d<gray>, <white>1d12h"

# === General ===
general:
  not-active: "Maintenance mode is not currently active."
  usage: "Usage: /maintenance <mode|allowed-users|allowed-groups|cooldown> [args...]"
  unknown-subcommand: "Unknown subcommand. Usage:"
  status-header: "Maintenance System:"
  status-line: "Status: {status}"
  status-on: "<red>Active (maintenance on)"
  status-off: "<green>Inactive (server open)"
  status-cooldown: "Cooldown: {cooldown}"
  status-cooldown-none: "<dark_gray>Not set"
  status-whitelisted: "Whitelisted: <white>{players} players<gray>, <white>{groups} groups<gray>."
  status-bypass-groups: "Bypass groups: {groups}"
  status-bypass-none: "<dark_gray>None"
  status-op-bypass: "OP bypass: {status}"
  status-op-enabled: "<green>Enabled"
  status-op-disabled: "<red>Disabled"
  status-icon: "Custom icon: {status}"
  status-icon-loaded: "<green>Loaded"
  status-icon-none: "<dark_gray>Not set"
  usage-mode: "<yellow>/maintenance mode <on | off>"
  usage-users: "<yellow>/maintenance allowed-users <list | add | remove> [player]"
  usage-groups: "<yellow>/maintenance allowed-groups <list | add | remove> [group]"
  usage-cooldown: "<yellow>/maintenance cooldown <duration | clear>"

