# ==========================================
# Moderation Messages
# ==========================================
# Messages for /ban, /unban, /tempban, /banip, /tempbanip, /unbanip,
# /mute, /tempmute, /unmute, /warn, /kick, /vanish, /supervanish,
# /sudo, /invsee, /echestsee, /deathitems, /oplist, /banlist, /setlogswebhook,
# /jail, /unjail, /setjail, /deljail, /jails, /jailinfo.
#
# Placeholders:
#   {player}    - Target player name
#   {staff}     - Staff member who performed the action
#   {reason}    - Punishment reason
#   {duration}  - Formatted duration (e.g., "7d", "1h 30m")
#   {expires}   - Expiry date/time
#   {index}     - Warning index number
#   {count}     - Total count (warnings, bans, etc.)
#   {page}      - Current page number
#   {max_page}  - Total pages
#   {ip}        - IP address
#   {uuid}      - Player UUID
# ==========================================

# === Ban ===
ban:
  success: "Banned <yellow>{player}</yellow>. <gray>Reason: {reason}"
  already-banned: "<yellow>{player}</yellow> is already banned!"
  kick-message: "\n<red><bold>You have been banned!</bold></red>\n\n<gray>Reason: <white>{reason}\n<gray>Appeal at: <yellow>{appeal}"
  usage: "Usage: /ban <player | uuid> [reason]"
  # Broadcast to staff with justplugin.announce.ban permission
  announce: "<red>[Ban]</red> <yellow>{player}</yellow> was banned by <yellow>{staff}</yellow>. <gray>Reason: {reason}"

# === Temp Ban ===
tempban:
  success: "Temporarily banned <yellow>{player}</yellow> for <yellow>{duration}</yellow>. Reason: <gray>{reason}"
  already-banned: "<yellow>{player}</yellow> is already banned!"
  kick-message: "\n<red><bold>You have been temporarily banned!</bold></red>\n\n<gray>Reason: <white>{reason}\n<gray>Duration: <yellow>{duration}\n<gray>Appeal at: <yellow>{appeal}"
  usage: "Usage: /tempban <player> <duration> [reason]"
  duration-hint: "Duration format: 1d2h30m (days, hours, minutes, seconds)"
  invalid-duration: "Invalid duration! Example: 1d2h30m"
  announce: "<red>[TempBan]</red> <yellow>{player}</yellow> has been temporarily banned by <yellow>{staff}</yellow> for <yellow>{duration}</yellow>. Reason: <gray>{reason}"

# === Ban IP ===
banip:
  success: "IP Banned <yellow>{ip}</yellow>. Reason: <gray>{reason}"
  success-resolved: "IP Banned <yellow>{ip}</yellow> (resolved from <yellow>{player}</yellow>). Reason: <gray>{reason}"
  already-banned: "IP <yellow>{ip}</yellow> is already IP banned!"
  no-ip-found: "Could not find an IP for <yellow>{player}</yellow>. They may have never joined."
  usage: "Usage: /banip <ip | player> [reason]"
  announce: "<red>[IP Ban]</red> IP <yellow>{ip}</yellow> has been IP banned by <yellow>{staff}</yellow>. Reason: <gray>{reason}"

# === Temp Ban IP ===
tempbanip:
  success: "Temporarily IP banned <yellow>{ip}</yellow> for <yellow>{duration}</yellow>."
  success-resolved: "Temporarily IP banned <yellow>{ip}</yellow> (resolved from <yellow>{player}</yellow>) for <yellow>{duration}</yellow>."
  already-banned: "IP <yellow>{ip}</yellow> is already IP banned!"
  no-ip-found: "Could not find an IP for <yellow>{player}</yellow>. They may have never joined."
  invalid-duration: "Invalid duration!"
  usage: "Usage: /tempbanip <ip | player> <duration> [reason]"
  announce: "<red>[Temp IP Ban]</red> IP <yellow>{ip}</yellow> has been temporarily IP banned by <yellow>{staff}</yellow> for <yellow>{duration}</yellow>."

# === Unban ===
unban:
  success: "Unbanned <yellow>{player}</yellow>."
  not-banned: "<yellow>{player}</yellow> is not banned!"
  ip-ban-warning: "This player also has an <red>IP ban</red> on <yellow>{ip}</yellow>."
  ip-ban-accounts: "Associated accounts: <yellow>{names}</yellow>"
  ip-ban-hint: "Use <yellow>/unbanip {ip}</yellow> to fully remove the IP ban."
  usage: "Usage: /unban <player | uuid>"

# === Unban IP ===
unbanip:
  success: "<bold>IP Ban Removed</bold>"
  ip-not-banned: "IP <yellow>{ip}</yellow> is not banned!"
  player-not-banned: "No IP ban found for <yellow>{player}</yellow>!"
  failed: "Failed to unban IP <yellow>{ip}</yellow>!"
  detail-ip: "IP: <yellow>{ip}"
  detail-reason: "Reason: <yellow>{reason}"
  detail-banned-by: "Banned by: <yellow>{staff}"
  detail-names: "Associated names: <yellow>{names}"
  detail-uuids: "Associated UUIDs: <yellow>{uuids}"
  detail-unbanned: "Unbanned: <green>{count}</green> record{s} <gray>(IP + associated accounts)"
  usage: "Usage: /unbanip <ip | player | uuid>"

