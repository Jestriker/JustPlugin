# ==========================================
# Chat Messages
# ==========================================
# Messages for /msg, /r (reply), /ignore, /announce, /sharecoords,
# /sharedeathcoords, /chat, /teammsg, /clearchat.
#
# Placeholders:
#   {player}    - Target player name
#   {sender}    - Sending player name
#   {message}   - The message content
#   {x}, {y}, {z} - Coordinates
#   {world}     - World name
#   {reply}     - Clickable reply button (when clickable-commands.msg-reply is true)
#   {count}     - Count (ignore list, etc.)
# ==========================================

# === Private Message ===
msg:
  # Format shown to the SENDER of a private message
  sent: "<gray>[<yellow>You</yellow> -> <yellow>{player}</yellow>] <white>{message}"
  # Format shown to the RECEIVER of a private message
  received: "<gray>[<yellow>{sender}</yellow> -> <yellow>You</yellow>] <white>{message} {reply}"
  usage: "Usage: /msg <player> <message>"
  self-message: "You can't message yourself!"
  # When target is ignoring sender
  ignored: "This player is not accepting messages from you."
  # When the sender is muted
  muted: "You are muted and cannot send private messages."

# === Reply ===
reply:
  no-target: "You have no one to reply to!"
  target-offline: "That player is no longer online."
  usage: "Usage: /r <message>"
  # When the sender is muted
  muted: "You are muted and cannot send private messages."
  # When target is ignoring sender
  ignored: "This player is ignoring you."

# === Ignore ===
ignore:
  added: "You are now ignoring <yellow>{player}</yellow>."
  removed: "You are no longer ignoring <yellow>{player}</yellow>."
  already-ignored: "You are already ignoring <yellow>{player}</yellow>."
  not-ignored: "You are not ignoring <yellow>{player}</yellow>."
  list-header: "<gold><bold>Ignore List</bold></gold> <gray>({count}):"
  list-empty: "Your ignore list is empty."
  list-cleared: "Your ignore list has been cleared."
  cannot-self: "You can't ignore yourself!"
  usage: "Usage: /ignore <add|remove|list|clearlist> [player]"
  add-usage: "Usage: /ignore add <player>"
  remove-usage: "Usage: /ignore remove <player>"
  # Sent to the ignored player when they are added
  ignored-by: "You have been ignored by <yellow>{player}</yellow>."
  # Sent when the target is not in the ignore list (for remove with offline player)
  not-in-list: "Player not found in your ignore list!"
  # Sent to the ignored player when they are removed
  unignored-by: "<yellow>{player}</yellow> is no longer ignoring you."
  # List display header with count
  list-display-header: "<gold><bold>Ignored Players</bold></gold> <dark_gray>(<green>{count}<dark_gray>)"
  # Shown when clearing an already-empty ignore list
  list-already-empty: "Your ignore list is already empty."
  # Shown after clearing the ignore list with count
  list-cleared-count: "Cleared your ignore list. <gray>({count} player(s) removed)</gray>"

# === Announce ===
announce:
  # The broadcast format. {message} is the announcement text.
  format: "\n<red><bold>⚠ Announcement</bold></red>\n<white>{message}\n"
  usage: "Usage: /announce <message>"

# === Share Coords ===
sharecoords:
  # Message format when sharing coordinates
  format: "<yellow>{player}</yellow> shared their location: <green>{x}, {y}, {z}</green> in <yellow>{world}</yellow>"
  usage: "Usage: /sharecoords [all|team]"

# === Share Death Coords ===
sharedeathcoords:
  format: "<yellow>{player}</yellow> shared their death location: <red>{x}, {y}, {z}</red> in <yellow>{world}</yellow>"
  no-death: "You don't have a death location to share."
  no-death-location: "No recorded death location. You haven't died yet!"
  usage: "Usage: /sharedeathcoords [all|team]"

# === Chat Mode ===
chat:
  switched-all: "Switched to <green>global</green> chat."
  switched-team: "Switched to <yellow>team</yellow> chat."
  not-in-team: "You are not in a team!"
  usage: "Usage: /chat <all|team>"
  current-mode: "Current chat mode: <yellow>{mode}</yellow>"
  invalid-mode: "Invalid chat mode! Use: all, team"
  mode-set: "Chat mode set to <yellow>{mode}</yellow>."

# === Team Message ===
teammsg:
  not-in-team: "You are not in a team!"
  usage: "Usage: /teammsg <message>"
  # Team chat format. {team} = team name
  format: "<dark_gray>[<yellow>{team}</yellow>]</dark_gray> <white>{sender}</white>: <gray>{message}"

# === Mail ===
mail:
  usage: "Usage: /mail <send|read|clear|clearall>"
  send-usage: "Usage: /mail send <player> <message>"
  sent: "Mail sent to <yellow>{player}</yellow>."
  received-notify: "You have new mail from <yellow>{sender}</yellow>! Type <yellow>/mail read</yellow> to view."
  self-send: "You can't send mail to yourself!"
  mailbox-full: "<yellow>{player}</yellow>'s mailbox is full!"
  empty: "Your mailbox is empty."
  invalid-page: "Invalid page number."
  header: "<gold><bold>Mailbox</bold></gold> <gray>({count} messages) <dark_gray>- Page {page}/{total}"
  cleared: "Cleared <yellow>{count}</yellow> read message(s)."
  cleared-all: "Cleared <yellow>{count}</yellow> message(s)."
  join-unread: "You have <yellow>{count}</yellow> unread mail message(s). Type <yellow>/mail read</yellow> to view."

# === Clear Chat ===
clearchat:
  cleared: "Chat has been cleared by <yellow>{player}</yellow>."
  cleared-reason: "Chat has been cleared by <yellow>{player}</yellow>. <gray>Reason: {reason}"
  usage: "Usage: /clearchat [reason]"
  # Shown to the person who cleared the chat
  success: "Chat has been cleared."

