# ==========================================
# Misc Messages
# ==========================================
# Messages for /discord, /applyedits, /tab, /rank, /plugins,
# /reloadscoreboard, /itemname, /shareitem, /setspawner,
# /skinban, /skinunban, and other miscellaneous features.
#
# Placeholders:
#   {link}      - Discord link URL
#   {code}      - Web editor apply code
#   {name}      - Item/skin name
#   {player}    - Player name
#   {type}      - Entity/spawner type
#   {count}     - Count of items in a list
# ==========================================

# === Discord ===
discord:
  # Message shown when player runs /discord
  link: "Join our Discord: <click:open_url:'{link}'><yellow><underlined>{link}</underlined></yellow></click>"
  not-set: "Discord link has not been configured."
  set-success: "Discord link set to: <yellow>{link}"
  set-usage: "Usage: /discord set <link>"
  header: "<gold><bold>Join our Discord!</bold></gold>"

# === Apply Edits (Web Editor) ===
applyedits:
  success: "Config changes applied successfully! Some changes may require a restart."
  invalid-code: "Invalid or expired code. Generate a new one from the web editor."
  no-pending: "No pending changes to apply."
  usage: "Usage: /applyedits <code>"
  not-running: "The web editor is not running. Enable it in config.yml under <yellow>web-editor.enabled</yellow>."
  open-hint: "Open the web editor at <aqua>http://localhost:{port}</aqua>"
  make-changes-hint: "Make your changes and use the generated code here."
  invalid-session: "Invalid or expired session code: <yellow>{code}</yellow>"
  session-expire-hint: "Session codes expire after <yellow>10 minutes</yellow>. Generate a new one from the web editor."
  # Placeholders: {count}, {file}, {code}
  applied: "Applied <yellow>{count}</yellow> change(s) to <aqua>{file}</aqua> from session <yellow>{code}</yellow>."
  more-changes: "... and {count} more changes."
  saved: "Config saved. Some changes may require a server restart to take full effect."

# === Tab ===
tab:
  refreshed: "Tab list refreshed."
  updated: "Tab list updated!"

# === Reload Scoreboard ===
reloadscoreboard:
  success: "Scoreboard configuration reloaded for all players."
  no-permission: "You don't have permission to reload the scoreboard."
  reloaded: "Scoreboard configuration reloaded and applied to all players."

# === Rank ===
rank:
  no-luckperms: "LuckPerms is not installed! The rank system requires LuckPerms."
  disabled: "The rank system is disabled. Enable it in config.yml (command-settings.rank.enabled)."
  disabled-msg: "The ranks system is currently disabled."
  requires-luckperms: "The ranks system requires <yellow>LuckPerms</yellow> to be installed on this server."
  install-hint: "Please ask a server administrator to install LuckPerms."

# === Plugins ===
plugins:
  header: "<gold><bold>Plugins</bold></gold> <gray>({count}):"

# === Item Name ===
itemname:
  success: "Item renamed to: {name}"
  empty-hand: "You must be holding an item!"
  usage: "Usage: /itemname <name>"

# === Share Item ===
shareitem:
  empty-hand: "You must be holding an item to share!"
  # The format when broadcasting. {player} = sender, {item} = hover-able item display
  format: "<yellow>{player}</yellow> is showing: {item}"

# === Repair ===
repair:
  no-permission-others: "You don't have permission to repair other players' items."
  empty-hand: "You must be holding an item to repair."
  target-empty-hand: "{player} is not holding an item."
  not-repairable: "This item cannot be repaired."
  already-repaired: "This item is already fully repaired."
  # Placeholders: {item} - item name
  success: "Repaired <yellow>{item}</yellow>!"
  # Placeholders: {player}, {item} - target player name and item name
  success-other: "Repaired <yellow>{player}</yellow>'s <yellow>{item}</yellow>!"
  # Sent to the target player when someone else repairs their item
  repaired-by: "Your <yellow>{item}</yellow> was repaired by <yellow>{player}</yellow>."
  usage: "Usage: /repair [player]"

# === Enchant ===
enchant:
  usage: "Usage: /enchant <enchantment> [level]"
  empty-hand: "You must be holding an item."
  # Placeholders: {enchantment} - the unknown enchantment name
  unknown: "Unknown enchantment: <yellow>{enchantment}</yellow>"
  invalid-level: "Level must be a number."
  # Placeholders: {enchantment}, {item}
  removed: "Removed <yellow>{enchantment}</yellow> from <yellow>{item}</yellow>."
  cannot-apply: "This enchantment cannot be applied to this item."
  # Placeholders: {enchantment}, {max}
  max-level: "Maximum level for <yellow>{enchantment}</yellow> is <yellow>{max}</yellow>."
  # Placeholders: {enchantment}, {level}, {item}
  applied: "Applied <yellow>{enchantment} {level}</yellow> to <yellow>{item}</yellow>."

# === Set Spawner ===
setspawner:
  success: "Spawner set to <yellow>{type}</yellow>."
  not-looking: "You must be looking at a spawner!"
  invalid-type: "Invalid entity type! Example: ZOMBIE, SKELETON, CREEPER"
  usage: "Usage: /setspawner <entity_type>"

# === Skin Ban ===
skinban:
  banned: "Skin <yellow>{name}</yellow> has been banned."
  already-banned: "Skin <yellow>{name}</yellow> is already banned."
  list-header: "<gold><bold>Banned Skins</bold></gold> <gray>({count}):"
  list-entry: " <gray>- <yellow>{name}"
  list-empty: "No skins are currently banned."
  usage: "Usage: /skinban <name|list>"

# === Skin Unban ===
skinunban:
  unbanned: "Skin <yellow>{name}</yellow> has been unbanned."
  not-banned: "Skin <yellow>{name}</yellow> is not banned."
  usage: "Usage: /skinunban <name>"

# === Startup Warnings ===
startup:
  warnings-header: "<gray>[<gradient:#ff6b6b:#ee5a24>JustPlugin</gradient><gray>] <yellow><bold>Startup Warnings:</bold></yellow>"
  warnings-footer: "  <dark_gray>Check config.yml for details."

# === Backup ===
# Placeholders: {filename}, {size}, {error}, {date}
backup:
  exporting: "Creating backup..."
  export-success: "Backup created: <yellow>{filename}</yellow> ({size})"
  export-failed: "Backup failed: <red>{error}</red>"
  import-confirm: "This will overwrite data! Type <yellow>/jpbackup import confirm</yellow>"
  import-success: "Backup imported. <yellow>Restart recommended.</yellow>"
  list-header: "<gold><bold>Backups</bold></gold>"
  list-entry: " <gray>- <yellow>{filename}</yellow> ({size}, {date})"
  list-empty: "No backups."
  deleted: "Deleted: <yellow>{filename}</yellow>"
  not-found: "Backup not found."
  usage: "Usage: /jpbackup <export|import|list|delete>"

# === Auto Messages ===
automessage:
  reloaded: "Automated messages reloaded. <yellow>{count}</yellow> messages loaded."
  list-header: "<gold><bold>Automated Messages</bold></gold> <gray>({count} total):"
  list-entry-enabled: " <green>●</green> <yellow>{id}</yellow> <gray>- {mode} - {detail}"
  list-entry-disabled: " <red>●</red> <yellow>{id}</yellow> <gray>- {mode} - {detail} <dark_gray>(disabled)"
  toggled-on: "Message <yellow>{id}</yellow> is now <green>enabled</green>."
  toggled-off: "Message <yellow>{id}</yellow> is now <red>disabled</red>."
  sent: "Force-sent message <yellow>{id}</yellow>."
  not-found: "Message <yellow>{id}</yellow> not found."
  none-configured: "No automated messages configured."
  usage: "Usage: /automessage <reload | list | toggle | send> [id]"

