# ==========================================
# JustPlugin - Scoreboard Configuration
# ==========================================
#
# A fully configurable sidebar scoreboard with 50+ placeholder variables.
# Each line supports emojis, MiniMessage formatting, and placeholders.
#
# See SCOREBOARD.md for the full list of available placeholders,
# configuration options, and examples.
#
# ==========================================

# Enable or disable the sidebar scoreboard.
enabled: true

# How often the scoreboard updates, in ticks (20 ticks = 1 second).
# Lower values = smoother but slightly more resource usage.
# Recommended: 20 (every 1 second).
update-interval: 20

# Global emoji toggle. When false, no emojis are shown on any line
# regardless of per-line settings. When true, per-line "show-emoji" controls each line.
global-emojis: true

# Sidebar title. Supports MiniMessage and all placeholders.
title: "<gradient:#00aaff:#00ffaa><bold>  JustServer  </bold></gradient>"

# ==========================================
# Wave Gradient Animation
# ==========================================
# When enabled, the gradient colors in the title will smoothly wave/shift
# through the color spectrum every interval, creating an animated effect.
# The two colors define the gradient endpoints that will oscillate.
wave-title:
  # Enable or disable the wave animation on the title gradient.
  enabled: true
  # The two gradient colors that will wave back and forth.
  color1: "#00aaff"
  color2: "#00ffaa"
  # Speed of the animation in ticks (20 ticks = 1 second).
  # Lower = faster wave. Default: 20 (shifts every 1 second).
  speed: 20

# ==========================================
# Ping Refresh
# ==========================================
# How often to check if a player's ping has changed, in ticks.
# If the ping value changes, the scoreboard is immediately updated for that player.
# Default: 100 (every 5 seconds). Set lower for faster updates (more CPU usage).
ping-refresh-interval: 100

# ==========================================
# Time Format
# ==========================================
# The format used for {real_time} in the scoreboard footer.
# Supported patterns (Java DateTimeFormatter):
#   HH:mm         - 24-hour hours and minutes (e.g. 14:30)
#   HH:mm:ss      - 24-hour with seconds (e.g. 14:30:05)
#   hh:mm a       - 12-hour with AM/PM (e.g. 02:30 PM)
#   dd/MM          - Day and month (e.g. 25/12)
#   dd/MM/YY       - Day, month, 2-digit year (e.g. 25/12/26)
#   dd/MM/YYYY     - Day, month, 4-digit year (e.g. 25/12/2026)
#   MM/dd/YYYY     - US-style date (e.g. 12/25/2026)
#   YYYY           - Year only (e.g. 2026)
#   YY             - 2-digit year (e.g. 26)
#   EEEE           - Full day name (e.g. Wednesday)
#   EEE            - Short day name (e.g. Wed)
#   Or any combination of the above!
time-format: "HH:mm"

# ==========================================
# Playtime Format
# ==========================================
# Controls how {session_playtime}, {total_playtime}, and {playtime_display} are displayed.
# Available formats:
#   compact    - No seconds shown, rounds to minutes (e.g. 1m, 5m, 2h 1m, 3d 5h)
#   detailed   - Includes seconds at all levels (e.g. 45s, 5m 30s, 2h 1m, 3d 5h)
#   hours_only - Only hours and minutes (e.g. 0h 1m, 0h 5m, 2h 1m, 50h 30m)
# Default is "compact" to avoid constant scoreboard updates every second.
playtime-format: "compact"

# ==========================================
# Default Playtime Mode
# ==========================================
# Controls what the {playtime_display} placeholder resolves to.
# This is the recommended placeholder for the scoreboard Playtime line.
#   "total"   - Total playtime across all sessions (never resets). DEFAULT.
#   "session" - Session playtime since the player's last login (resets on reconnect).
# You can always use {total_playtime} or {session_playtime} directly
# in any line to bypass this setting.
default-playtime: "total"

# ==========================================
# Lines Configuration
# ==========================================
# Each line has:
#   text:       The text to display. Supports MiniMessage tags and {placeholder} variables.
#               Use {emoji} in the text to place the emoji where you want it.
#   emoji:      The default emoji for this line. Can be changed to any text/symbol.
#   show-emoji: Whether to show the emoji for this specific line (respects global-emojis too).
#   condition:  Optional condition to show this line. Supported: "has_team" (only shows if player is in a team).
#               Leave empty or omit to always show the line.
#
# IMPORTANT: The sidebar supports a maximum of 15 lines.
# Lines are displayed in the order listed below (top to bottom).
#
# Use {empty} or {blank} for empty space.
# Use {line} for a separator line (━━━━━━━).
#
# Compact number formats: {balance_short}, {kills_short}, {deaths_short}
# These format numbers with K, M, B suffixes (e.g. 25.70K, 1.50M).
# ==========================================

lines:
  # --- Blank spacer ---
  - text: " "
    emoji: ""
    show-emoji: false

  # --- Money ---
  - text: "{emoji}  <white>Money <green>{balance_short}"
    emoji: "<bold><green>$</bold>"
    show-emoji: true

  # --- Kills ---
  - text: "{emoji}<white>Kills <red>{kills_short}"
    emoji: "<bold><red>🗡 </bold>"
    show-emoji: true

  # --- Deaths ---
  - text: "{emoji}  <white>Deaths <#ff8800>{deaths_short}"
    emoji: "<#ff8800>☠"
    show-emoji: true

  # --- Playtime (controlled by "default-playtime" setting: total or session) ---
  - text: "{emoji}  <white>Playtime <yellow>{playtime_display}"
    emoji: "<yellow>⏳"
    show-emoji: true

  # --- Team (only shown if player is in a team) ---
  - text: "{emoji}  <white>Team <aqua>{team}"
    emoji: "<bold><aqua>🛡</bold>"
    show-emoji: true
    condition: "has_team"

  # --- Footer spacer ---
  - text: " "
    emoji: ""
    show-emoji: false

  # --- Footer: ping + time ---
  - text: "    <#0368cf>{ping}ms <white>| <#0368cf>{real_time}"
    emoji: ""
    show-emoji: false

