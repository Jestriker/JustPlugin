# ==========================================
# Maintenance System
# ==========================================
# The maintenance system has two independent settings:
#
# 1. FEATURE ENABLED (command-settings.maintenance.enabled above):
#    Controls whether the maintenance system exists at all.
#    If disabled, the /maintenance command is unavailable and maintenance
#    mode can never be activated. For servers that don't want this feature.
#
# 2. MODE ACTIVE (toggled via /maintenance mode on|off, stored in maintenance.yml):
#    Controls whether the server is currently IN maintenance mode.
#    Only relevant when the feature is enabled.
#
# Summary:
#   Feature DISABLED             -> system doesn't exist, everyone joins normally
#   Feature ENABLED + Mode OFF   -> "Open mode" - everyone joins, staff can toggle maintenance
#   Feature ENABLED + Mode ON    -> "Maintenance mode" - only whitelisted players can join
#
# Whitelisted players and cooldown state are stored in maintenance.yml (auto-generated).
# Maintenance messages, MOTD, icon, group bypass, and OP bypass are configured in
# the dedicated maintenance/config.yml file (auto-generated on first startup).
# ==========================================

# ==========================================
# Ranks System (LuckPerms Integration)
# ==========================================
# This system is DISABLED by default. Enable it above in commands.rank.enabled.
# Requires LuckPerms to be installed on the server.
# If enabled without LuckPerms, players will be notified that LuckPerms is missing.
#
# The /rank command opens a management GUI with two sections:
#   - Groups: View, create, delete, rename, change prefix/suffix, set parents,
#             and manage permission nodes for LuckPerms groups.
#   - Players: View known players, add/remove from groups, and manage
#              individual permission nodes.
#
# All data is read from and written to LuckPerms in real-time.
# No additional configuration is needed here - groups and players are
# discovered dynamically from LuckPerms.
#
# Every action requires its own permission (justplugin.rank.groups.*,
# justplugin.rank.players.*). See PERMISSIONS.md for the full list.

