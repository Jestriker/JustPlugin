# ==========================================
# Command-Specific Behavior Settings
# Additional per-command behavior configuration (not permissions).
# Permissions are fixed in plugin.yml and cannot be changed here.
# ==========================================
commands:
  getdeathpos:
    # If true, players need justplugin.getdeathpos permission to view their OWN death location.
    # If false, any player can view their own death location without permission.
    require-permission-self: false

