# ==========================================
# JustPlugin Configuration
# An EssentialsX-like plugin
# ==========================================

# ==========================================
# General Settings
# ==========================================

# MOTD is now configured in motd.yml (separate file).

# Discord link shown by /discord. Editable in-game with /discord set <link>.
discord-link: "https://discord.gg/example"

# Timezone for /clock and /date commands (e.g. "UTC", "America/New_York", "Europe/London").
timezone: "UTC"

# ==========================================
# Staff Groups
# ==========================================
# LuckPerms groups that count as "staff" for the {online_staff} placeholder.
# Players with justplugin.staff permission also count. Duplicates are not counted twice.
staff-groups:
  - admin
  - mod
  - staff

# ==========================================
# Chat Format Settings
# ==========================================
chat:
  # The separator between the player name and their message in global chat.
  # Format: [prefix] [name] [suffix]<separator>[message]
  # Supports MiniMessage. Common options: "»", ":", ">", "-", ">>", "|"
  # Set to empty string "" for no separator.
  separator: "<dark_gray> > <reset>"

  # --- Hover Tooltip ---
  # When hovering over a player's name/prefix/suffix in chat, a stats tooltip appears.
  # Fully configurable with all {placeholder} variables (same as scoreboard).
  # Also supports %PlaceholderAPI% tokens if PlaceholderAPI is installed.
  hover:
    # Enable or disable the hover tooltip on player names in chat.
    enabled: true
    # Lines shown in the tooltip. Supports MiniMessage + {placeholder} variables.
    lines:
      - "{prefix} {name} {suffix}"
      - "<dark_gray>━━━━━━━━━━━━━━━━"
      - "<green>$ <white>Money: <yellow>{balance_short}"
      - "<red>🗡 <white>Kills: <red>{kills_short}"
      - "<#ff8800>☠ <white>Deaths: <#ff8800>{deaths_short}"
      - "<yellow>⏳ <white>Playtime: <yellow>{playtime_compact}"
      - "<dark_gray>━━━━━━━━━━━━━━━━"
    # Text shown at the bottom of the tooltip if the viewer has permission to click.
    # Clicking opens /stats <player> for the hovered player.
    click-to-view: "<gray>Click to view statistics"
    # Permission required to see the "Click to view statistics" line and click it.
    click-to-view-permission: "justplugin.stats.others"

# ==========================================
# Economy Settings
# ==========================================
economy:
  # Economy provider to use.
  # "justplugin" - uses JustPlugin's built-in economy system (default).
  # "vault" - uses Vault's economy API. Requires the Vault plugin and an economy
  #           provider (e.g. EssentialsX Economy, CMI, etc.) installed on the server.
  #           All JustPlugin economy commands (/balance, /pay, /baltop, /addcash,
  #           /paynote, /trade coins, etc.) will read/write through Vault instead.
  #           If Vault is not found or has no economy provider, it falls back to JustPlugin's system.
  provider: "justplugin"
  # Starting balance for new players (only used when provider is "justplugin").
  starting-balance: 100.0
  # Currency symbol displayed before amounts (e.g. "$100.00").
  # When provider is "vault", this is ignored - Vault's economy plugin provides formatting.
  currency-symbol: "$"
  # Whether to show the currency symbol in the scoreboard's {balance_short} placeholder.
  # When false, scoreboard shows "25.70K" instead of "$25.70K".
  show-symbol-scoreboard: false

# ==========================================
# Teleportation Settings
# ==========================================
teleport:
  # How long TPA requests last before auto-expiring (seconds).
  request-timeout: 60
  # Maximum distance from world center for /tpr (wild/rtp).
  wild-range: 50000
  # Minimum distance from 0,0 for /tpr to prevent spawning too close to spawn.
  wild-min-range: 500

  # --- Cooldowns (countdown before teleport executes) ---
  # After running a TP command, the player must wait this many seconds
  # before the teleportation actually happens. Moving or taking damage cancels it.
  # Players must have the explicit cooldownbypass permission to skip cooldowns.
  # Set to 0 for instant teleportation (no countdown).
  cooldown-tpa: 3
  cooldown-tpahere: 3
  cooldown-warp: 5
  cooldown-spawn: 5
  cooldown-back: 5
  cooldown-home: 3
  cooldown-teamhome: 3
  cooldown-wild: 5

  # --- Delays (minimum time between successive uses of the same command) ---
  # After using a TP command, the player must wait this long before they can use
  # the same command again. Players need the delaybypass permission to skip delays.
  # Values in seconds. Set to 0 to disable the delay for that feature.
  delay-tpa: 180          # 3 minutes
  delay-tpahere: 180      # 3 minutes
  delay-warp: 900         # 15 minutes
  delay-spawn: 300        # 5 minutes
  delay-back: 1800        # 30 minutes
  delay-home: 300         # 5 minutes
  delay-teamhome: 300     # 5 minutes
  delay-wild: 1800        # 30 minutes

  # --- Safe Teleport Protection ---
  # When enabled, teleportation is blocked if the destination is unsafe.
  # Checks a 3×3 area around the destination for hazardous blocks
  # (lava, fire, cactus, pressure plates, tripwire, sculk sensors, etc.)
  # and ensures the player has solid ground to stand on.
  # Players with *.unsafetp permission bypass these checks (with a warning).
  safe-teleport-tpa: true
  safe-teleport-tpahere: true
  safe-teleport-warp: true
  safe-teleport-spawn: true
  safe-teleport-home: true
  safe-teleport-teamhome: true
  safe-teleport-back: true
  safe-teleport-wild: true

# ==========================================
# Clickable Commands
# When enabled, command suggestions in chat messages become clickable buttons.
# ==========================================
clickable-commands:
  # TPA-related buttons: /tpaccept, /tpreject, /tpacancel
  tpa: true
  # Team-related buttons: /team join <name>, /team help entries
  team: true
  # Trade-related buttons: /trade accept, /trade deny, /trade cancel
  trade: true
  # Clickable [↩ Reply] button on received private messages
  msg-reply: true
  # Clickable commands in /help pages (click to suggest command)
  help: true
  # Clickable warp names in /warps and /warp (list mode)
  warp-list: true
  # Clickable home names when listing homes
  home-list: true
  # Clickable [✕ Remove] buttons in /ignore list
  ignore: true

# ==========================================
# Trade Settings
# ==========================================
trade:
  # How long trade requests last before auto-expiring (seconds).
  request-timeout: 60

# ==========================================
# Home Settings
# ==========================================
homes:
  # Maximum number of homes per player.
  max-homes: 3

# ==========================================
# Warning System
# Configurable punishments per warning level.
# Supported actions: ChatMessage, Kick, TempBan <duration>, Ban, ChatMute, ChatTempMute <duration>, NoPunishment
# Duration examples: 5m, 1h, 1d, 7d, 30d, 365d
# ==========================================
warns:
  punishments:
    1: "ChatMessage"
    2: "Kick"
    3: "TempBan 5m"
    4: "TempBan 1d"
    5: "TempBan 30d"
    6: "TempBan 365d"
    7: "Ban"
  # Text shown to players in warnings/bans about where to appeal.
  # Defaults to the value of discord-link if not set.
  appeal-source: ""

# ==========================================
# Default Reasons
# Default punishment reasons when no reason is specified.
# ==========================================
default-reasons:
  ban: "Banned by an operator"
  tempban: "Temporarily banned"
  kick: "Kicked by an operator"
  mute: "Muted by an operator"
  tempmute: "Temporarily muted"

# ==========================================
# Web Editor
# Self-hosted config editor accessible via a web browser.
# When enabled, the plugin runs a lightweight HTTP server that serves
# a beautiful config editing page. Changes made in the editor are staged
# and require running /applyedits <code> in-game (highest permission).
#
# SECURITY NOTE: The web editor has no authentication - anyone who can
# reach the port can view and propose config changes. However, changes
# are NEVER applied automatically; they require an in-game command by
# a player with justplugin.applyedits permission. For public servers,
# bind to localhost and use a reverse proxy with authentication.
# ==========================================
web-editor:
  # Enable or disable the web editor server.
  enabled: false
  # Port the web editor listens on.
  port: 8585
  # Bind address. Use "127.0.0.1" for localhost only (recommended), "0.0.0.0" for all interfaces.
  bind-address: "127.0.0.1"

# ==========================================
# Discord Webhook Logging
# Configure with /setlogswebhook <url>
# ==========================================
discord-webhook:
  enabled: true
  url: ""

# ==========================================
# Vanilla Command Logging
# Logs specified vanilla Minecraft commands to staff chat and Discord webhook.
# Players see these logs with the justplugin.log.vanilla permission.
# Console always sees them. Disable by setting enabled to false.
# The commands list below can be customized - add or remove command names.
# ==========================================
vanilla-command-log:
  enabled: true
  # Commands to log. Add/remove as needed. Do not include the leading slash.
  commands:
    - op
    - deop
    - stop
    - restart
    - reload
    - kick
    - ban
    - ban-ip
    - pardon
    - pardon-ip
    - banlist
    - whitelist
    - give
    - item
    - gamemode
    - xp
    - experience
    - tp
    - teleport
    - summon
    - kill
    - gamerule
    - time
    - weather
    - setworldspawn
    - setblock
    - fill
    - fillbiome
    - clearspawnpoint
    - setmaxplayers
    - seed
    - tick
    - say
    - locate
    - advancement
    - execute
    - ops

# ==========================================
# Tab List Customization
# ==========================================
tab:
  # Tab header and footer displayed above and below the player list.
  # Supports MiniMessage. Placeholders: {player}, {online}, {max}, {tps}, {ping}
  header: "\n<gradient:#00aaff:#00ffaa><bold>  JustPlugin Server  </bold></gradient>\n"
  footer: "\n<gray>Players: <yellow>{online}<gray>/<yellow>{max} <gray>| <gray>Ping: <yellow>{ping}ms <gray>| <gray>TPS: <yellow>{tps}\n<gray>Type <yellow>/help</yellow> for commands.\n"
  # How often the tab header/footer refreshes, in seconds.
  # Lower values keep TPS and Ping more up-to-date but use slightly more resources.
  # Default: 5 (every 5 seconds). Set to 0 to disable periodic updates (only on join).
  refresh-interval: 5
  # --- Maintenance Footer Line ---
  # When enabled AND maintenance mode is active, an extra line is appended to the tab footer.
  # Automatically disappears when maintenance is turned off.
  maintenance-footer-enabled: false
  maintenance-footer-line: "\n<red><bold>⚠</bold> Server is in maintenance mode</red>"

# ==========================================
# Entity Clear System (ClearLag replacement)
# Automatically clears ground items and optionally mobs at set intervals.
# ==========================================
entity-clear:
  # Enable or disable the automatic entity clearing system.
  enabled: true
  # Interval between clears, in seconds. Default: 900 (15 minutes).
  interval: 900
  # How many seconds before a clear to send a warning message. Set to 0 to disable.
  warning-before: 30
  # What to clear:
  clear-items: true
  clear-hostile: false
  clear-friendly: false
  # Whether to announce clears and warnings to all players (true) or staff only (false).
  announce-to-all: true
  # Warning message before a clear. Use %seconds% for the countdown.
  warning-message: "<yellow>⚠ Ground items will be cleared in %seconds% seconds!</yellow>"
  # Message shown after a clear. Use %items%, %mobs%, %total%.
  clear-message: "<gray>[<gradient:#00aaff:#00ffaa>EntityClear</gradient>] <green>Cleared %items% items and %mobs% mobs.</green>"
  # Excessive entity thresholds per chunk (staff notifications).
  excessive-mob-threshold: 50
  excessive-armorstand-threshold: 30
  excessive-itemframe-threshold: 30

# ==========================================
# Spawn Settings
# Set automatically by /setspawn - do not edit manually unless you know what you're doing.
