# ==========================================
# JustPlugin Configuration
# An EssentialsX-like plugin
# ==========================================

# ==========================================
# General Settings
# ==========================================

# Message of the Day - shown to players on join.
# Supports MiniMessage format. Use {player} for the player's name.
motd: "<gradient:#00aaff:#00ffaa><bold>Welcome to the server, {player}!</bold></gradient>\n<gray>Type <yellow>/help</yellow> for commands."

# Discord link shown by /discord. Editable in-game with /discord set <link>.
discord-link: "https://discord.gg/example"

# Timezone for /clock and /date commands (e.g. "UTC", "America/New_York", "Europe/London").
timezone: "UTC"

# ==========================================
# Economy Settings
# ==========================================
economy:
  # Starting balance for new players.
  starting-balance: 100.0
  # Currency symbol displayed before amounts (e.g. "$100.00").
  currency-symbol: "$"

# ==========================================
# Teleportation Settings
# ==========================================
teleport:
  # Delay in seconds before teleporting (0 = instant).
  # Players with justplugin.teleport.bypass skip this delay.
  # Moving during the delay cancels the teleport.
  delay: 3
  # How long TPA requests last before auto-expiring (seconds).
  request-timeout: 60
  # Maximum distance from world center for /tpr (wild/rtp).
  wild-range: 5000
  # Minimum distance from 0,0 for /tpr to prevent spawning too close to spawn.
  wild-min-range: 500

  # --- Cooldowns (seconds between command uses) ---
  # Applies to ALL players, even OPs.
  # Only players with explicit nocooldown permission bypass these.
  # Set to 0 to disable the cooldown for that feature.
  cooldown-tpa: 30
  cooldown-tpahere: 30
  cooldown-warp: 10
  cooldown-spawn: 10
  cooldown-back: 10
  cooldown-home: 10

  # --- Safe Teleport Protection ---
  # When enabled, teleportation is blocked if the destination is unsafe.
  # Checks a 3×3 area around the destination for hazardous blocks
  # (lava, fire, cactus, pressure plates, tripwire, sculk sensors, etc.)
  # and ensures the player has solid ground to stand on.
  # Players with *.unsafetp permission bypass these checks (with a warning).
  safe-teleport-tpa: true
  safe-teleport-tpahere: true
  safe-teleport-warp: true
  safe-teleport-spawn: true
  safe-teleport-home: true
  safe-teleport-back: true

# ==========================================
# Clickable Commands
# When enabled, command suggestions in chat messages become clickable buttons.
# ==========================================
clickable-commands:
  # TPA-related buttons: /tpaccept, /tpreject, /tpacancel
  tpa: true
  # Team-related buttons: /team join <name>, /team help entries
  team: true
  # Trade-related buttons: /trade accept, /trade deny, /trade cancel
  trade: true
  # Clickable [↩ Reply] button on received private messages
  msg-reply: true
  # Clickable commands in /help pages (click to suggest command)
  help: true
  # Clickable warp names in /warps and /warp (list mode)
  warp-list: true
  # Clickable home names when listing homes
  home-list: true
  # Clickable [✕ Remove] buttons in /ignore list
  ignore: true

# ==========================================
# Trade Settings
# ==========================================
trade:
  # How long trade requests last before auto-expiring (seconds).
  request-timeout: 60

# ==========================================
# Home Settings
# ==========================================
homes:
  # Maximum number of homes per player.
  max-homes: 5

# ==========================================
# Warning System
# Configurable punishments per warning level.
# Supported actions: ChatMessage, Kick, TempBan <duration>, Ban, ChatMute, ChatTempMute <duration>, NoPunishment
# Duration examples: 5m, 1h, 1d, 7d, 30d, 365d
# ==========================================
warns:
  punishments:
    1: "ChatMessage"
    2: "Kick"
    3: "TempBan 5m"
    4: "TempBan 1d"
    5: "TempBan 30d"
    6: "TempBan 365d"
    7: "Ban"
  # Text shown to players in warnings/bans about where to appeal.
  # Defaults to the value of discord-link if not set.
  appeal-source: ""

# ==========================================
# Default Reasons
# Default punishment reasons when no reason is specified.
# ==========================================
default-reasons:
  ban: "Banned by an operator"
  tempban: "Temporarily banned"
  kick: "Kicked by an operator"
  mute: "Muted by an operator"
  tempmute: "Temporarily muted"

# ==========================================
# Web Editor
# Self-hosted config editor accessible via a web browser.
# When enabled, the plugin runs a lightweight HTTP server that serves
# a beautiful config editing page. Changes made in the editor are staged
# and require running /applyedits <code> in-game (highest permission).
#
# SECURITY NOTE: The web editor has no authentication - anyone who can
# reach the port can view and propose config changes. However, changes
# are NEVER applied automatically; they require an in-game command by
# a player with justplugin.applyedits permission. For public servers,
# bind to localhost and use a reverse proxy with authentication.
# ==========================================
web-editor:
  # Enable or disable the web editor server.
  enabled: false
  # Port the web editor listens on.
  port: 8585
  # Bind address. Use "0.0.0.0" for all interfaces, "127.0.0.1" for localhost only.
  bind-address: "0.0.0.0"

# ==========================================
# Discord Webhook Logging
# Configure with /setlogswebhook <url>
# ==========================================
discord-webhook:
  enabled: true
  url: ""

# ==========================================
# Vanilla Command Logging
# Logs specified vanilla Minecraft commands to staff chat and Discord webhook.
# Players see these logs with the justplugin.log.vanilla permission.
# Console always sees them. Disable by setting enabled to false.
# The commands list below can be customized - add or remove command names.
# ==========================================
vanilla-command-log:
  enabled: true
  # Commands to log. Add/remove as needed. Do not include the leading slash.
  commands:
    - op
    - deop
    - stop
    - restart
    - reload
    - kick
    - ban
    - ban-ip
    - pardon
    - pardon-ip
    - banlist
    - whitelist
    - give
    - item
    - gamemode
    - xp
    - experience
    - tp
    - teleport
    - summon
    - kill
    - gamerule
    - time
    - weather
    - setworldspawn
    - setblock
    - fill
    - fillbiome
    - clearspawnpoint
    - setmaxplayers
    - seed
    - tick
    - say
    - locate
    - advancement
    - execute
    - ops

# ==========================================
# Tab List Customization
# ==========================================
tab:
  # Tab header and footer displayed above and below the player list.
  # Supports MiniMessage. Placeholders: {player}, {online}, {max}
  header: "\n<gradient:#00aaff:#00ffaa><bold>  JustPlugin Server  </bold></gradient>\n"
  footer: "\n<gray>Players: <yellow>{online}<gray>/<yellow>{max}\n<gray>Type <yellow>/help</yellow> for commands.\n"

# ==========================================
# Spawn Settings
# Set automatically by /setspawn — do not edit manually unless you know what you're doing.
# ==========================================
# spawn:
#   world: "world"
#   x: 0.0
#   y: 64.0
#   z: 0.0
#   yaw: 0.0
#   pitch: 0.0

# ==========================================
# Command-Specific Settings
# Additional per-command configuration beyond enable/disable.
# ==========================================
commands:
  getdeathpos:
    # If true, players need justplugin.getdeathpos permission to view their OWN death location.
    # If false, any player can view their own death location without permission.
    # Viewing OTHER players' death locations always requires justplugin.getdeathpos.others.
    require-permission-self: false

