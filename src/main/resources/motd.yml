# ==========================================
# JustPlugin - MOTD Configuration
# ==========================================
#
# Two separate MOTDs:
#
#   server-motd  - The text shown in the Minecraft server list (multiplayer screen).
#                  Supports MiniMessage formatting. Placeholders: {online}, {max}
#                  Set to "" (empty) to use the vanilla server.properties motd.
#
#   join-motd    - The message shown to each player when they join the server.
#                  Supports MiniMessage formatting. Placeholders: {player}, {online}, {max}
#                  Set to "" (empty) to disable the join message.
#
# Both support MiniMessage tags: <bold>, <italic>, <gradient:#hex:#hex>, <color>, etc.
# Multi-line: use \n for line breaks.
#
# Commands:
#   /motd                     - View both MOTDs
#   /motd server <text>       - Set the server list MOTD
#   /motd join <text>         - Set the join MOTD
#   /resetmotd                - Reset both to defaults
#   /resetmotd server         - Reset only the server list MOTD
#   /resetmotd join           - Reset only the join MOTD
#
# ==========================================

# Server list MOTD - shown when players see your server in the multiplayer list.
server-motd: "<gradient:#00aaff:#00ffaa><bold>JustPlugin Server</bold></gradient>\n<gray>Powered by JustPlugin"

# Join MOTD - shown to players in chat when they join.
join-motd: "<gradient:#00aaff:#00ffaa><bold>Welcome to the server, {player}!</bold></gradient>\n<gray>Type <yellow>/help</yellow> for commands."

