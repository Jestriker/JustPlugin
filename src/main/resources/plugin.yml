  # --- Basic command permissions ---
  justplugin.tpaccept:
    description: Accept a teleport request
    default: false
  justplugin.tpacancel:
    description: Cancel your own teleport request
    default: false
  justplugin.tpreject:
    description: Reject a teleport request
    default: false
  justplugin.getpos:
    description: Get your own current position
    default: false
  justplugin.near:
    description: Show nearby players with distance and direction
    default: false
  justplugin.discord:
    description: View the server Discord link
    default: false
  justplugin.info:
    description: View plugin info (/jpinfo)
    default: false
  justplugin.help:
    description: View plugin help (/help, /jphelp)
    default: false
  justplugin.list:
    description: List online players (/plist)
    default: false
  justplugin.motd:
    description: View the server MOTD
    default: false
  justplugin.clock:
    description: Show current real time
    default: false
  justplugin.date:
    description: Show current real date and time
    default: false

  # --- Cooldown bypass permissions ---
  # Cooldown = countdown timer BEFORE the teleport executes (e.g., 3 seconds standing still).
  # These are NOT included in justplugin.* - even OPs wait for cooldowns unless explicitly granted.
  # Must be explicitly granted via a permissions plugin.
  justplugin.tpa.cooldownbypass:
    description: Bypass TPA pre-teleport countdown
    default: false
  justplugin.tpahere.cooldownbypass:
    description: Bypass TPAHere pre-teleport countdown
    default: false
  justplugin.warp.cooldownbypass:
    description: Bypass warp pre-teleport countdown
    default: false
  justplugin.spawn.cooldownbypass:
    description: Bypass spawn pre-teleport countdown
    default: false
  justplugin.home.cooldownbypass:
    description: Bypass home pre-teleport countdown
    default: false
  justplugin.back.cooldownbypass:
    description: Bypass /back pre-teleport countdown
    default: false
  justplugin.wild.cooldownbypass:
    description: Bypass wild/RTP pre-teleport countdown
    default: false

  # --- Delay bypass permissions ---
  # Delay = minimum time between successive uses of the same command (e.g., 3 minutes).
  # Must be explicitly granted via a permissions plugin.
  justplugin.tpa.delaybypass:
    description: Bypass TPA delay between uses
    default: false
  justplugin.tpahere.delaybypass:
    description: Bypass TPAHere delay between uses
    default: false
  justplugin.warp.delaybypass:
    description: Bypass warp delay between uses
    default: false
