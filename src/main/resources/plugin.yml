name: JustPlugin
version: '${version}'
main: org.justme.justPlugin.JustPlugin
api-version: '1.21'
folia-supported: true
description: An EssentialsX-like plugin for your server.
author: JustMe
website: https://liam.plus/justplugin
softdepend: [Vault, LuckPerms, PlaceholderAPI]

commands:
  # === Teleportation ===
  tpa:
    description: Request to teleport to a player
    usage: /tpa <player>
    permission: justplugin.tpa
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept
    permission: justplugin.tpaccept
    aliases: [tpyes]
  tpacancel:
    description: Cancel your teleport request
    usage: /tpacancel
    permission: justplugin.tpacancel
  tpreject:
    description: Reject a teleport request
    usage: /tpreject
    permission: justplugin.tpreject
    aliases: [tpdeny, tpno]
  tppos:
    description: Teleport to coordinates
    usage: /tppos <x> <y> <z> [world]
    permission: justplugin.tppos
    aliases: [tpposition]
  tpr:
    description: Random teleport
    usage: /tpr
    permission: justplugin.wild
    aliases: [wild, rtp]
  tpahere:
    description: Request a player to teleport to you
    usage: /tpahere <player>
    permission: justplugin.tpahere
  back:
    description: Return to your last location
    usage: /back
    permission: justplugin.back
    aliases: [return]
  spawn:
    description: Teleport to spawn
    usage: /spawn
    permission: justplugin.spawn
  setspawn:
    description: Set the world spawn
    usage: /setspawn
    permission: justplugin.setspawn
  tpsafecheck:
    description: Internal safety-checked teleport (used by /getpos buttons)
    usage: /tpsafecheck <player>
    permission: justplugin.tppos
  tpunsafeconfirm:
    description: Confirm teleport to an unsafe destination (used by TP Anyway button)
    usage: /tpunsafeconfirm
    permission: justplugin.tppos
  tpoff:
    description: Teleport to an offline player's last location
    usage: /tpoff <player>
    permission: justplugin.tpoff
  getposoff:
    description: Get an offline player's last known position
    usage: /getposoff <player>
    permission: justplugin.getposoff
  getdeathposoff:
    description: Get an offline player's last death position
    usage: /getdeathposoff <player>
    permission: justplugin.getdeathposoff

  # === Warps ===
  warp:
    description: Teleport to a warp or list warps
    usage: /warp [name]
    permission: justplugin.warp
  warps:
    description: List all warps
    usage: /warps
    permission: justplugin.warp
    aliases: [warplist]
  setwarp:
    description: Create a warp
    usage: /setwarp <name>
    permission: justplugin.setwarp
    aliases: [createwarp]
  delwarp:
    description: Delete a warp
    usage: /delwarp <name>
    permission: justplugin.delwarp
    aliases: [removewarp, rmwarp]
  renamewarp:
    description: Rename a warp
    usage: /renamewarp <old> <new>
    permission: justplugin.renamewarp

  # === Homes ===
  home:
    description: Teleport to a home
    usage: /home [name]
    permission: justplugin.home
    aliases: [h]
  sethome:
    description: Set a home
    usage: /sethome [name]
    permission: justplugin.sethome
    aliases: [sh, createhome]
  delhome:
    description: Delete a home
    usage: /delhome <name>
    permission: justplugin.delhome
    aliases: [removehome, rmhome]

  # === Economy ===
  balance:
    description: Check your balance
    usage: /balance [player]
    permission: justplugin.balance
    aliases: [bal, money]
  pay:
    description: Pay a player
    usage: /pay <player> <amount>
    permission: justplugin.pay
  paytoggle:
    description: Toggle receiving payments
    usage: /paytoggle
    permission: justplugin.paytoggle
  paynote:
    description: Create a redeemable balance note from 1 paper
    usage: /paynote <amount>
    permission: justplugin.paynote
  addcash:
    description: Add cash to yourself or another player
    usage: /addcash [player] <amount>
    permission: justplugin.addcash
    aliases: [givemoney, addmoney, addbal]
  baltop:
    description: View the balance leaderboard
    usage: /baltop
    permission: justplugin.balance
    aliases: [balancetop, moneytop, topbal]
  baltophide:
    description: Hide or show yourself on the balance leaderboard
    usage: /baltophide
    permission: justplugin.baltophide
    aliases: [hidebaltop, balancetophide]
  transactions:
    description: View transaction history
    usage: /transactions [player]
    permission: justplugin.transactions
    aliases: [txhistory, transactionhistory]

  # === Moderation ===
  ban:
    description: Ban a player
    usage: /ban <player | uuid> [reason]
    permission: justplugin.ban
  banip:
    description: Ban an IP address
    usage: /banip <ip | player> [reason]
    permission: justplugin.banip
    aliases: [ban-ip]
  tempban:
    description: Temporarily ban a player
    usage: /tempban <player> <duration> [reason]
    permission: justplugin.tempban
    aliases: [tban]
  tempbanip:
    description: Temporarily ban an IP
    usage: /tempbanip <ip | player> <duration> [reason]
    permission: justplugin.tempbanip
    aliases: [tbanip]
  unban:
    description: Unban a player
    usage: /unban <player | uuid>
    permission: justplugin.unban
    aliases: [pardon]
  unbanip:
    description: Unban an IP address, player name, or UUID
    usage: /unbanip <ip | player | uuid>
    permission: justplugin.unbanip
    aliases: [pardon-ip, unban-ip]
  vanish:
    description: Toggle vanish mode
    usage: /vanish [player]
    permission: justplugin.vanish
    aliases: [v]
  supervanish:
    description: Toggle super vanish (spectator-based full ghost mode)
    usage: /supervanish [player]
    permission: justplugin.supervanish
    aliases: [sv]
  sudo:
    description: Force a player to run a command
    usage: /sudo <player> <command | message>
    permission: justplugin.sudo
  invsee:
    description: View a player's inventory
    usage: /invsee <player>
    permission: justplugin.invsee
    aliases: [openinv]
  echestsee:
    description: View a player's ender chest
    usage: /echestsee <player>
    permission: justplugin.echestsee
    aliases: [openec]
  invseeoff:
    description: View an offline player's saved inventory (read-only)
    usage: /invseeoff <player>
    permission: justplugin.invseeoff
  echestseeoff:
    description: View an offline player's saved ender chest (read-only)
    usage: /echestseeoff <player>
    permission: justplugin.echestseeoff
  mute:
    description: Permanently mute a player
    usage: /mute <player> [reason]
    permission: justplugin.mute
  tempmute:
    description: Temporarily mute a player
    usage: /tempmute <player> <duration> [reason]
    permission: justplugin.tempmute
    aliases: [tmute]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
    permission: justplugin.unmute
  warn:
    description: Manage player warnings
    usage: /warn <add | remove | list | confirm | cancel> <player> [reason | index]
    permission: justplugin.warn
    aliases: [warning, warnings]
  kick:
    description: Kick a player from the server
    usage: /kick <player> [reason]
    permission: justplugin.kick
  setlogswebhook:
    description: Configure Discord webhook for log output
    usage: /setlogswebhook <url | disable | confirm | cancel | tryagain>
    permission: justplugin.setlogswebhook
    aliases: [logwebhook, webhooklog]
  deathitems:
    description: View or restore a player's items from their last death
    usage: /deathitems [player]
    permission: justplugin.deathitems
    aliases: [di, deathinv, deathitems]
  oplist:
    description: List all server operators
    usage: /oplist
    permission: justplugin.oplist
    aliases: [ops, operators]
  banlist:
    description: View the ban list with pagination
    usage: /banlist [page]
    permission: justplugin.banlist
    aliases: [bans]
  permissions:
    description: View the effective permissions of an online player
    usage: /permissions <player> [filter] [page]
    permission: justplugin.permissions
    aliases: [perms, permslist, permissionlist]
  baniplist:
    description: View the IP ban list with pagination
    usage: /baniplist [page]
    permission: justplugin.banlist
    aliases: [ipbans, ipbanlist]
  jail:
    description: Jail a player
    usage: /jail <player> [duration] [reason]
    permission: justplugin.jail
  unjail:
    description: Release a player from jail
    usage: /unjail <player>
    permission: justplugin.unjail
    aliases: [unjailplayer]
  setjail:
    description: Set a jail location
    usage: /setjail <name>
    permission: justplugin.setjail
    aliases: [createjail]
  deljail:
    description: Delete a jail location
    usage: /deljail <name>
    permission: justplugin.deljail
    aliases: [removejail, rmjail]
  jails:
    description: List all jail locations
    usage: /jails
    permission: justplugin.jails
    aliases: [jaillist]
  jailinfo:
    description: View jail info for a player
    usage: /jailinfo <player>
    permission: justplugin.jailinfo

  # === Player ===
  fly:
    description: Toggle flight
    usage: /fly [player]
    permission: justplugin.fly
  gm:
    description: Change game mode
    usage: /gm <0 | 1 | 2 | 3 | survival | creative | adventure | spectator> [player]
    permission: justplugin.gamemode
    aliases: [gamemode]
  gmc:
    description: Switch to creative mode
    usage: /gmc [player]
    permission: justplugin.gamemode
  gms:
    description: Switch to survival mode
    usage: /gms [player]
    permission: justplugin.gamemode
  gma:
    description: Switch to adventure mode
    usage: /gma [player]
    permission: justplugin.gamemode
  gmsp:
    description: Switch to spectator mode
    usage: /gmsp [player]
    permission: justplugin.gamemode
  gmcheck:
    description: Check a player's current game mode
    usage: /gmcheck [player]
    permission: justplugin.gmcheck
    aliases: [checkgm, gamemodecheck]
  god:
    description: Toggle god mode
    usage: /god [player]
    permission: justplugin.god
    aliases: [godmode, tgm]
  speed:
    description: Set walk/fly speed (dynamic based on state)
    usage: /speed <0-10> [player]
    permission: justplugin.speed
  flyspeed:
    description: Set fly speed
    usage: /flyspeed <0-10> [player]
    permission: justplugin.speed
    aliases: [fspeed]
  walkspeed:
    description: Set walk speed
    usage: /walkspeed <0-10> [player]
    permission: justplugin.speed
    aliases: [wspeed]
  hat:
    description: Wear an item as a hat
    usage: /hat
    permission: justplugin.hat
  exp:
    description: Manage experience
    usage: /exp <set | give> <levels | orbs> <amount> [player]
    permission: justplugin.exp
    aliases: [xp]
  skull:
    description: Get a player's skull
    usage: /skull [player]
    permission: justplugin.skull
    aliases: [head, playerhead]
  suicide:
    description: Kill yourself
    usage: /suicide
    permission: justplugin.suicide
  heal:
    description: Restore health
    usage: /heal [player]
    permission: justplugin.heal
  feed:
    description: Restore hunger
    usage: /feed [player]
    permission: justplugin.feed
  kill:
    description: Kill yourself, a player, or mass-kill entities
    usage: /kill [player | mobs | hostile | friendly | items | entities | players | allplayers | everything]
    permission: justplugin.kill
  getpos:
    description: Get your or another player's current position
    usage: /getpos [player]
    permission: justplugin.getpos
    aliases: [whereami, position, getcoords, coords]
  getdeathpos:
    description: Get your or another player's last death location
    usage: /getdeathpos [player]
    permission: justplugin.getdeathpos
    aliases: [getdeathcoords, deathpos, deathcoords]
  near:
    description: Show nearby players with distance and direction
    usage: /near [radius]
    permission: justplugin.near
    aliases: [nearby]

  # === AFK ===
  afk:
    description: Toggle AFK status
    usage: /afk
    permission: justplugin.afk

  # === Chat ===
  msg:
    description: Send a private message
    usage: /msg <player> <message>
    permission: justplugin.msg
    aliases: [tell, whisper, w, m, pm, dm]
  r:
    description: Reply to last message
    usage: /r <message>
    permission: justplugin.msg
    aliases: [reply]
  ignore:
    description: Manage your ignore list
    usage: /ignore <add|remove|list|clearlist> [player]
    permission: justplugin.ignore
  announce:
    description: Broadcast a message
    usage: /announce <message>
    permission: justplugin.announce
    aliases: [broadcast, bcast]
  sharecoords:
    description: Share your coordinates with chat
    usage: /sharecoords [all | team]
    permission: justplugin.sharecoords
    aliases: [sendcoords]
  sharedeathcoords:
    description: Share your last death coordinates with chat
    usage: /sharedeathcoords [all | team]
    permission: justplugin.sharedeathcoords
    aliases: [senddeathcoords]
  chat:
    description: Switch chat mode
    usage: /chat <all | team>
    permission: justplugin.chat
  teammsg:
    description: Send a one-off message to your team without changing chat mode
    usage: /teammsg <message>
    permission: justplugin.chat
    aliases: [tmsg, tm]
  clearchat:
    description: Clear the chat for all players
    usage: /clearchat [reason]
    permission: justplugin.clearchat
    aliases: [cc, chatclear]
  mail:
    description: Send and read offline mail
    usage: /mail <send|read|clear|clearall>
    permission: justplugin.mail

  # === Virtual Inventories ===
  anvil:
    description: Open a virtual anvil
    usage: /anvil
    permission: justplugin.anvil
  grindstone:
    description: Open a virtual grindstone
    usage: /grindstone
    permission: justplugin.grindstone
  enderchest:
    description: Open your ender chest
    usage: /enderchest
    permission: justplugin.enderchest
    aliases: [echest, ec]
  craft:
    description: Open a virtual crafting table
    usage: /craft
    permission: justplugin.craft
    aliases: [workbench, wb]
  stonecutter:
    description: Open a virtual stonecutter
    usage: /stonecutter
    permission: justplugin.stonecutter
  loom:
    description: Open a virtual loom
    usage: /loom
    permission: justplugin.loom
  smithingtable:
    description: Open a virtual smithing table
    usage: /smithingtable
    permission: justplugin.smithingtable
    aliases: [smithtable]
  enchantingtable:
    description: Open a virtual enchanting table
    usage: /enchantingtable
    permission: justplugin.enchantingtable
    aliases: [enchtable]
  pv:
    description: Open a player vault
    usage: /pv [number]
    permission: justplugin.vault
    aliases: [playervault, vault]

  # === Info ===
  jpinfo:
    description: Plugin information
    usage: /jpinfo
    permission: justplugin.info
    aliases: [about]
  jphelp:
    description: Show help
    usage: /jphelp [page]
    permission: justplugin.help
  playerinfo:
    description: View player info
    usage: /playerinfo <player>
    permission: justplugin.playerinfo
    aliases: [whois, seen]
  plist:
    description: List online players
    usage: /plist
    permission: justplugin.list
    aliases: [who, online, players]
  playerlist:
    description: Advanced player list with pagination, staff tags, and vanish indicators
    usage: /playerlist [page]
    permission: justplugin.playerlist
    aliases: [pls]
  playerlisthide:
    description: Hide or show a player on the player list
    usage: /playerlisthide [player]
    permission: justplugin.playerlist.hide
    aliases: [plhide, hideplayer]
  motd:
    description: View or set the server list MOTD and join MOTD
    usage: /motd [server|join] [message]
    permission: justplugin.motd
  resetmotd:
    description: Reset one or both MOTDs to plugin defaults
    usage: /resetmotd [server|join]
    permission: justplugin.motd.set
  clock:
    description: Show current time
    usage: /clock
    permission: justplugin.clock
    aliases: [realtime, rltime]
  date:
    description: Show current date and time
    usage: /date
    permission: justplugin.date
    aliases: [realdate, rldate]

  # === Items ===
  itemname:
    description: Rename an item
    usage: /itemname <name>
    permission: justplugin.itemname
    aliases: [rename, iname]
  shareitem:
    description: Show your held item in chat
    usage: /shareitem
    permission: justplugin.shareitem
    aliases: [show, showitem]
  setspawner:
    description: Change a spawner's entity type
    usage: /setspawner <type>
    permission: justplugin.setspawner
    aliases: [changespawner]
  repair:
    description: Repair the held item to full durability
    usage: /repair [player]
    permission: justplugin.repair
    aliases: [fix]
  enchant:
    description: Apply an enchantment to the held item
    usage: /enchant <enchantment> [level]
    permission: justplugin.enchant

  # === World ===
  weather:
    description: Set the weather
    usage: /weather <sun | rain | thunder>
    permission: justplugin.weather
  time:
    description: Set or query time
    usage: /time <set | add | query> <value>
    permission: justplugin.time
  freezegame:
    description: Freeze the game (pause tick processing)
    usage: /freezegame
    permission: justplugin.freezegame
    aliases: [tf]
  unfreezegame:
    description: Unfreeze the game (resume tick processing)
    usage: /unfreezegame
    permission: justplugin.unfreezegame
    aliases: [unft]
  clearentities:
    description: Manually clear ground items and mobs
    usage: /clearentities
    permission: justplugin.clearentities
    aliases: [ce, entityclear, clearlag]
  friendlyfire:
    description: Toggle PvP on or off server-wide
    usage: /friendlyfire <enable | disable>
    permission: justplugin.friendlyfire
    aliases: [ff, pvp, pvptoggle]

  # === Teams ===
  team:
    description: Team management
    usage: /team <create | disband | invite | join | leave | kick | promote | demote | sethome | delhome | home | info | list>
    permission: justplugin.team

  # === Misc ===
  trade:
    description: Trade with a player
    usage: /trade <player | accept | deny>
    permission: justplugin.trade
  discord:
    description: Show the Discord link
    usage: /discord
    permission: justplugin.discord
    aliases: [dc]
  applyedits:
    description: Apply pending config changes from the web editor
    usage: /applyedits <code>
    permission: justplugin.applyedits
    aliases: [configapply, webapply]
  tab:
    description: Refresh tab list
    usage: /tab
    permission: justplugin.tab
  reloadscoreboard:
    description: Reload the scoreboard configuration and refresh for all players (staff only)
    usage: /reloadscoreboard
    permission: justplugin.scoreboard.reload
    aliases: [reloadsb]

  # === Kits ===
  kit:
    description: Open kit selection GUI or claim a kit
    usage: /kit [name]
    permission: justplugin.kit
    aliases: [kits]
  kitpreview:
    description: Preview a kit's contents
    usage: /kitpreview <name>
    permission: justplugin.kit.preview
  kitcreate:
    description: Create a new kit
    usage: /kitcreate
    permission: justplugin.kit.create
  kitedit:
    description: Edit an existing kit
    usage: /kitedit <name>
    permission: justplugin.kit.edit
  kitrename:
    description: Rename a kit
    usage: /kitrename <old> <new>
    permission: justplugin.kit.rename
  kitdelete:
    description: Delete a kit (archives by default, use 'permanent' flag for permanent)
    usage: /kitdelete <name> [permanent]
    permission: justplugin.kit.delete
  kitpublish:
    description: Publish a kit to make it available to players
    usage: /kitpublish <name>
    permission: justplugin.kit.publish
  kitdisable:
    description: Disable a kit
    usage: /kitdisable <name>
    permission: justplugin.kit.disable
  kitenable:
    description: Enable a disabled kit
    usage: /kitenable <name>
    permission: justplugin.kit.disable
  kitarchive:
    description: Manage archived kits
    usage: /kitarchive [restore|delete|deleteall] [name]
    permission: justplugin.kit.archive
  kitlist:
    description: List all kits with statuses
    usage: /kitlist
    permission: justplugin.kit.list

  # === Auto Messages ===
  automessage:
    description: Manage automated messages
    usage: /automessage <reload|list|toggle|send> [id]
    permission: justplugin.automessage
    aliases: [automsg, amsg]

  # === Backup ===
  jpbackup:
    description: Backup and restore plugin data
    usage: /jpbackup <export|import|list|delete>
    permission: justplugin.backup
    aliases: [backup]

  # === Overrides ===
  help:
    description: Show plugin help
    usage: /help [page]
    permission: justplugin.help
    aliases: [?]
  "?":
    description: Show plugin help (alias for /help)
    usage: /? [page]
    permission: justplugin.help
  plugins:
    description: Show installed plugins
    usage: /plugins
    permission: justplugin.plugins
    aliases: [pl]

  # === Ranks (LuckPerms integration) ===
  rank:
    description: Open the ranks menu (requires LuckPerms integration)
    usage: /rank
    permission: justplugin.rank
    aliases: [ranks]

  # === Stats ===
  stats:
    description: View player statistics in a GUI
    usage: /stats [player]
    permission: justplugin.stats
    aliases: [statistics]

  # === Maintenance ===
  maintenance:
    description: Manage server maintenance mode
    usage: /maintenance <mode | allowed-users | allowed-groups | cooldown> [args...]
    permission: justplugin.maintenance
    aliases: [maint]

  # === Skins ===
  skin:
    description: Set, clear, or reset your skin
    usage: /skin <set | clear> [name] [player]
    permission: justplugin.skin
    aliases: [setskin]
  skinban:
    description: Ban a skin name from being used
    usage: /skinban [name | list]
    permission: justplugin.skinban
  skinunban:
    description: Unban a skin name
    usage: /skinunban <name>
    permission: justplugin.skinunban

  # === Nicknames & Tags ===
  nick:
    description: Set or remove your nickname
    usage: /nick <name|off|reset>
    permission: justplugin.nick
    aliases: [nickname]
  tag:
    description: Open the tag selector or equip a tag
    usage: /tag [name|off]
    permission: justplugin.tag
    aliases: [tags]
  tagcreate:
    description: Create a new tag
    usage: /tagcreate <id> <prefix|suffix> <display...>
    permission: justplugin.tag.create
  tagdelete:
    description: Delete a tag
    usage: /tagdelete <id>
    permission: justplugin.tag.delete
  taglist:
    description: List all tags
    usage: /taglist
    permission: justplugin.tag.list

permissions:
  justplugin.*:
    description: All JustPlugin permissions
    default: false
    children:
      justplugin.tpa: true
      justplugin.tpaccept: true
      justplugin.tpacancel: true
      justplugin.tpreject: true
      justplugin.tpahere: true
      justplugin.tppos: true
      justplugin.wild: true
      justplugin.wild.nether: true
      justplugin.wild.end: true
      justplugin.baltop.viewhidden: true
      justplugin.back: true
      justplugin.spawn: true
      justplugin.setspawn: true
      justplugin.warp: true
      justplugin.setwarp: true
      justplugin.delwarp: true
      justplugin.renamewarp: true
      justplugin.home: true
      justplugin.sethome: true
      justplugin.delhome: true
      justplugin.balance: true
      justplugin.balance.others: true
      justplugin.pay: true
      justplugin.paytoggle: true
      justplugin.paynote: true
      justplugin.ban: true
      justplugin.banip: true
      justplugin.tempban: true
      justplugin.tempbanip: true
      justplugin.unban: true
      justplugin.unbanip: true
      justplugin.vanish: true
      justplugin.vanish.others: true
      justplugin.vanish.see: true
      justplugin.supervanish: true
      justplugin.supervanish.others: true
      justplugin.sudo: true
      justplugin.invsee: true
      justplugin.echestsee: true
      justplugin.invseeoff: true
      justplugin.echestseeoff: true
      justplugin.tpoff: true
      justplugin.getposoff: true
      justplugin.getdeathposoff: true
      justplugin.spawnprotection.bypass: true
      justplugin.seedprotection.bypass: true
      justplugin.seedprotection.notify: true
      justplugin.mute: true
      justplugin.tempmute: true
      justplugin.unmute: true
      justplugin.warn: true
      justplugin.warn.notify: true
      justplugin.kick: true
