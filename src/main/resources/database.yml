# Database Configuration
# Options: yaml, sqlite, mysql
# If sqlite or mysql fail to connect, falls back to yaml automatically.
storage-type: "yaml"

sqlite:
  file: "justplugin.db"

mysql:
  host: "localhost"
  port: 3306
  database: "justplugin"
  username: "root"
  password: ""
  pool-size: 10
  use-ssl: false
